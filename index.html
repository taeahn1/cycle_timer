<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle Timer</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --recall: #f43f5e;
      --connect: #60a5fa;
      --find: #a78bfa;
      --write: #fbbf24;
      --boost-c: #f43f5e;
      --insight-c: #a78bfa;
      --green: #4ade80;
      --muted: rgba(255, 255, 255, 0.38);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    /* ── SHARED ── */
    .page-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      text-align: center;
    }

    .btn {
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.22s ease;
      color: white;
      font-weight: 700;
      padding: 0.85rem 2rem;
    }

    /* ── MAIN SCREEN ── */
    #mainScreen {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .today-card {
      background: var(--surface);
      border-radius: 1.25rem;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .stat-val {
      font-size: 0.98rem;
      font-weight: 700;
    }

    .stat-val.boost {
      color: var(--boost-c);
    }

    .stat-val.insight {
      color: var(--insight-c);
    }

    .stat-val.time {
      color: var(--green);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }

    .entry-btns {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-bottom: 1.2rem;
    }

    .boost-btn {
      background: linear-gradient(135deg, #f43f5e, #fb923c);
    }

    .boost-btn:hover {
      filter: brightness(1.12);
      transform: scale(1.02);
    }

    .insight-btn {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
    }

    .insight-btn:hover {
      filter: brightness(1.12);
      transform: scale(1.02);
    }

    .history-btn {
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: var(--muted);
      padding: 0.5rem 1.2rem;
      font-size: 0.82rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-btn:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: white;
    }

    /* ── SESSION SCREEN ── */
    #sessionScreen {
      width: 100%;
      max-width: 400px;
      text-align: center;
      display: none;
    }

    .session-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
    }

    .session-badge.boost {
      background: rgba(244, 63, 94, 0.18);
      color: var(--boost-c);
      border: 1px solid rgba(244, 63, 94, 0.3);
    }

    .session-badge.insight {
      background: rgba(167, 139, 250, 0.18);
      color: var(--insight-c);
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    .phase-label {
      font-size: 1.85rem;
      font-weight: 800;
      min-height: 2.4rem;
      margin-bottom: 0.4rem;
      animation: fadeIn 0.35s ease;
      letter-spacing: 0.01em;
    }

    .phase-label.recall {
      color: var(--recall);
    }

    .phase-label.connect {
      color: var(--connect);
    }

    .phase-label.find {
      color: var(--find);
    }

    .phase-label.write {
      color: var(--write);
    }

    .timer {
      font-size: 5.5rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      margin: 0.4rem 0 1.5rem;
    }

    /* Session log */
    .log-wrap {
      min-height: 2.2rem;
      margin-bottom: 1.75rem;
      padding: 0 0.5rem;
    }

    .log-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
    }

    .log-badge {
      padding: 0.22rem 0.65rem;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 0.78rem;
    }

    .log-badge.boost {
      background: rgba(244, 63, 94, 0.2);
      color: var(--boost-c);
    }

    .log-badge.insight {
      background: rgba(167, 139, 250, 0.2);
      color: var(--insight-c);
    }

    .log-badge.current {
      animation: badgePulse 1.6s infinite;
    }

    .log-arrow {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .controls {
      display: flex;
      gap: 0.65rem;
      justify-content: center;
    }

    .stop-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.75);
      padding: 0.75rem 1.75rem;
      font-size: 0.95rem;
    }

    .stop-btn:hover {
      background: rgba(244, 63, 94, 0.25);
      border-color: var(--recall);
    }

    .switch-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 255, 255, 0.13);
      color: rgba(255, 255, 255, 0.65);
      padding: 0.75rem 1.75rem;
      font-size: 0.95rem;
    }

    .switch-btn:hover {
      background: rgba(255, 255, 255, 0.13);
      color: white;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 1.5rem;
      padding: 1.75rem;
      width: 90%;
      max-width: 380px;
      max-height: 75vh;
      overflow-y: auto;
      animation: slideUp 0.28s ease;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .modal-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: white;
    }

    .h-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .h-row {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 1rem;
      padding: 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .h-date {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .h-stats {
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
    }

    .h-stat {
      font-size: 0.8rem;
      font-weight: 700;
    }

    .h-stat.boost {
      color: var(--boost-c);
    }

    .h-stat.insight {
      color: var(--insight-c);
    }

    .h-stat.time {
      color: var(--green);
    }

    .h-empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem 0;
      font-size: 0.9rem;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    @keyframes badgePulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.65;
        transform: scale(0.96);
      }
    }

    .pulse {
      animation: pulse 1.8s infinite;
    }
  </style>
</head>

<body>

  <!-- ── MAIN SCREEN ── -->
  <div id="mainScreen">
    <div class="page-title">Cycles</div>

    <div class="today-card">
      <div class="stat-row">
        <span class="stat-label">🔴 뇌혈류부스트</span>
        <span class="stat-val boost"><span id="todayBoost">0</span> 사이클</span>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <span class="stat-label">💡 인사이트</span>
        <span class="stat-val insight"><span id="todayInsight">0</span> 사이클</span>
      </div>
      <div class="divider"></div>
      <div class="stat-row">
        <span class="stat-label">⏱ 공부시간</span>
        <span class="stat-val time" id="todayStudyTime">0분</span>
      </div>
    </div>

    <div class="entry-btns">
      <button id="startBoostBtn" class="btn boost-btn">▶ 뇌혈류부스트 시작</button>
      <button id="startInsightBtn" class="btn insight-btn">▶ 인사이트 시작</button>
    </div>
    <button class="history-btn" id="historyBtn">📅 History</button>
  </div>

  <!-- ── SESSION SCREEN ── -->
  <div id="sessionScreen">
    <div id="sessionBadge" class="session-badge"></div>
    <div id="phaseLabel" class="phase-label"></div>
    <div id="timer" class="timer">--:--</div>
    <div class="log-wrap">
      <div class="log-inner" id="sessionLog"></div>
    </div>
    <div class="controls">
      <button id="stopBtn" class="btn stop-btn">⏹ Stop</button>
      <button id="switchBtn" class="btn switch-btn"></button>
    </div>
  </div>

  <!-- ── HISTORY MODAL ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">History</div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="h-list" id="historyList"></div>
    </div>
  </div>

  <script>
    // ── Session definitions ──────────────────────────
    const DEFS = {
      boost: {
        key: 'boost', name: '뇌혈류부스트', emoji: '🔴',
        cycleMins: 5,
        phases: [
          { label: 'RECALL', speak: 'Recall', dur: 120, cls: 'recall' },
          { label: 'CONNECT', speak: 'Connect', dur: 180, cls: 'connect' }
        ]
      },
      insight: {
        key: 'insight', name: '인사이트', emoji: '💡',
        cycleMins: 15,
        phases: [
          { label: 'FIND YOUR INSIGHT', speak: 'Find your insight', dur: 600, cls: 'find' },
          { label: 'WRITE YOUR INSIGHT', speak: 'Write your insight', dur: 300, cls: 'write' }
        ]
      }
    };

    const STORE = 'cycle_timer_v2';

    // ── State ────────────────────────────────────────
    let curType = null;
    let curPhase = 0;
    let timeLeft = 0;
    let running = false;
    let ticker = null;
    // log = [{type:'boost', count:2}, {type:'insight', count:1}, ...]
    let log = [];

    // ── DOM ──────────────────────────────────────────
    const mainScreen = document.getElementById('mainScreen');
    const sessionScreen = document.getElementById('sessionScreen');
    const badgeEl = document.getElementById('sessionBadge');
    const phaseEl = document.getElementById('phaseLabel');
    const timerEl = document.getElementById('timer');
    const logEl = document.getElementById('sessionLog');
    const stopBtn = document.getElementById('stopBtn');
    const switchBtn = document.getElementById('switchBtn');

    // ── Storage ──────────────────────────────────────
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function loadAll() { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch { return {}; } }
    function saveAll(h) { localStorage.setItem(STORE, JSON.stringify(h)); }
    function getToday() { const d = loadAll()[todayKey()] || {}; return { boost: d.boost || 0, insight: d.insight || 0 }; }
    function addCycle(type) {
      const h = loadAll(), k = todayKey();
      if (!h[k]) h[k] = { boost: 0, insight: 0 };
      h[k][type]++;
      saveAll(h);
      refreshMain();
    }

    // ── Main stats ───────────────────────────────────
    function studyMins(b, i) { return b * 5 + i * 15; }
    function fmtTime(m) {
      if (!m) return '0분';
      return m < 60 ? `${m}분` : (m % 60 ? `${Math.floor(m / 60)}시간 ${m % 60}분` : `${Math.floor(m / 60)}시간`);
    }
    function refreshMain() {
      const { boost, insight } = getToday();
      document.getElementById('todayBoost').textContent = boost;
      document.getElementById('todayInsight').textContent = insight;
      document.getElementById('todayStudyTime').textContent = fmtTime(studyMins(boost, insight));
    }

    // ── Speech ───────────────────────────────────────
    function speak(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.9; u.volume = 1;
      speechSynthesis.speak(u);
    }

    // ── Timer display ────────────────────────────────
    function fmtSec(s) { return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; }
    function refreshTimer() {
      timerEl.textContent = fmtSec(timeLeft);
      timerEl.className = 'timer' + (timeLeft <= 10 ? ' pulse' : '');
    }

    // ── Log rendering ────────────────────────────────
    function renderLog() {
      if (!log.length) { logEl.innerHTML = ''; return; }
      logEl.innerHTML = log.map((seg, i) => {
        const def = DEFS[seg.type];
        const isCur = i === log.length - 1;
        const label = `${def.emoji} ×${seg.count}${isCur ? '…' : ''}`;
        const badge = `<span class="log-badge ${seg.type}${isCur ? ' current' : ''}">${label}</span>`;
        const arrow = i < log.length - 1 ? '<span class="log-arrow">→</span>' : '';
        return badge + arrow;
      }).join('');
    }

    // ── Phase control ────────────────────────────────
    function gotoPhase(idx) {
      curPhase = idx;
      const ph = DEFS[curType].phases[idx];
      timeLeft = ph.dur;
      phaseEl.textContent = ph.label;
      phaseEl.className = `phase-label ${ph.cls}`;
      speak(ph.speak);
    }

    // ── Update session badge + switch button ─────────
    function refreshBadge() {
      const def = DEFS[curType];
      badgeEl.textContent = `${def.emoji} ${def.name}`;
      badgeEl.className = `session-badge ${curType}`;
      const other = DEFS[curType === 'boost' ? 'insight' : 'boost'];
      switchBtn.textContent = `↔ ${other.name}`;
    }

    // ── Start session ────────────────────────────────
    function startSession(type) {
      curType = type;
      running = true;
      log = [{ type, count: 0 }];
      mainScreen.style.display = 'none';
      sessionScreen.style.display = 'block';
      refreshBadge();
      gotoPhase(0);
      renderLog();
      refreshTimer();
      clearInterval(ticker);
      ticker = setInterval(tick, 1000);
    }

    // ── Tick ─────────────────────────────────────────
    function tick() {
      timeLeft--;
      if (timeLeft <= 0) {
        const phases = DEFS[curType].phases;
        const next = (curPhase + 1) % phases.length;
        if (next === 0) {
          // Full cycle complete
          addCycle(curType);
          log[log.length - 1].count++;
          renderLog();
        }
        gotoPhase(next);
      }
      refreshTimer();
    }

    // ── Switch session type ──────────────────────────
    function switchSession() {
      curType = curType === 'boost' ? 'insight' : 'boost';
      log.push({ type: curType, count: 0 });
      refreshBadge();
      gotoPhase(0);
      renderLog();
    }

    // ── Stop ─────────────────────────────────────────
    function stopSession() {
      running = false;
      clearInterval(ticker);
      sessionScreen.style.display = 'none';
      mainScreen.style.display = 'block';
      log = [];
      refreshMain();
    }

    // ── History modal ─────────────────────────────────
    function dateLabel(key) {
      const [y, m, d] = key.split('-');
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      return `${y}.${m}.${d} (${days[new Date(y, m - 1, d).getDay()]})`;
    }
    function openHistory() {
      const all = loadAll();
      const entries = Object.entries(all).sort(([a], [b]) => b.localeCompare(a));
      const list = document.getElementById('historyList');
      if (!entries.length) {
        list.innerHTML = '<div class="h-empty">아직 기록이 없어요</div>';
      } else {
        list.innerHTML = entries.map(([key, data]) => {
          const b = data.boost || 0, ins = data.insight || 0;
          const sm = studyMins(b, ins);
          return `<div class="h-row">
            <div class="h-date">${dateLabel(key)}</div>
            <div class="h-stats">
              <span class="h-stat boost">🔴 부스트 ×${b}</span>
              <span class="h-stat insight">💡 인사이트 ×${ins}</span>
              <span class="h-stat time">⏱ ${fmtTime(sm)}</span>
            </div>
          </div>`;
        }).join('');
      }
      document.getElementById('modalOverlay').classList.add('open');
    }

    // ── Events ───────────────────────────────────────
    document.getElementById('startBoostBtn').addEventListener('click', () => startSession('boost'));
    document.getElementById('startInsightBtn').addEventListener('click', () => startSession('insight'));
    stopBtn.addEventListener('click', stopSession);
    switchBtn.addEventListener('click', switchSession);
    document.getElementById('historyBtn').addEventListener('click', openHistory);
    document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('open');
    });

    // ── Init ─────────────────────────────────────────
    refreshMain();
  </script>
</body>

</html>
